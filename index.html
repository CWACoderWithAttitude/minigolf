<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Golf Tracker</title>
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5x/gH3tsE8L" crossorigin="anonymous"></script>
    <style>
        /* Basic responsive styling */
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 1rem; }
        .container { display: flex; flex-direction: column; gap: 1rem; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Miniature Golf Tracker</h1>
        
        <div id="game-area">
            <form hx-post="/start-game" hx-target="#game-area" hx-swap="innerHTML">
                <h2>Start a New Game</h2>
                <label for="course_name">Course Name:</label>
                <input type="text" id="course_name" name="course_name" value="The Grand Vista" required>
                
                <h3>Players</h3>
                <input type="text" name="players" placeholder="Player 1 Name" required><br>
                <input type="text" name="players" placeholder="Player 2 Name"><br>
                <input type="text" name="players" placeholder="Player 3 Name"><br>
                <input type="text" name="players" placeholder="Player 4 Name"><br>
                <button type="submit">Start Game</button>
            </form>
        </div>
    </div>
</body>
</html>
